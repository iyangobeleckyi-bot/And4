<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Dashboard FIX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
  body {
    margin: 0;
    background: black;
    font-family: monospace;
    color: #00ffcc;
  }

  .dashboard {
    display: flex;
    width: 100vw;
    height: 100vh;
  }

  .panel {
    width: 300px;
    background: rgba(0,20,15,0.95);
    border-right: 1px solid rgba(0,255,200,0.2);
    padding: 12px;
    box-sizing: border-box;
  }

  .photo {
    width: 100%;
    height: 140px;
    background: url('https://picsum.photos/300/200') center/cover;
    margin-bottom: 10px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  td {
    padding: 6px;
    font-size: 12px;
  }

  tr {
    border-bottom: 1px solid rgba(0,255,200,0.1);
  }

  .ok { color: #00ffcc; }
  .warn { color: #ffcc00; }

  #map {
    flex: 1;
    height: 100vh; /* критично */
  }
</style>
</head>

<body>

<div class="dashboard">

  <div class="panel">
    <div class="photo"></div>
    <table id="table"></table>
  </div>

  <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // "config.h" прямо тут (бо ти не запускаєш сервер)
  const CONFIG = [
    ["Speed", 120, "km/h", "ok"],
    ["Altitude", 850, "m", "ok"],
    ["Temp", 32, "°C", "warn"],
    ["Wind", 18, "m/s", "warn"],
    ["Battery", 78, "%", "ok"],
    ["Signal", 60, "%", "warn"],
    ["Pressure", 101.3, "kPa", "ok"],
    ["Humidity", 55, "%", "ok"],
    ["CPU", 72, "%", "warn"],
    ["Voltage", 11.8, "V", "ok"]
  ];

  const table = document.getElementById("table");

  CONFIG.forEach(p => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${p[0]}</td>
      <td class="${p[3]}">${p[1]}</td>
      <td>${p[2]}</td>
    `;
    table.appendChild(row);
  });

  // карта
  const map = L.map('map').setView([48.9226, 24.7111], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  const marker = L.marker([48.9226, 24.7111]).addTo(map);

  // рух
  setInterval(() => {
    const lat = 48.92 + Math.random() * 0.01;
    const lng = 24.71 + Math.random() * 0.01;
    marker.setLatLng([lat, lng]);
  }, 2000);
</script>

</body>
</html>
